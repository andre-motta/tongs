name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for tongs? We'd love to hear it. If you're unsure whether it fits, open a discussion first.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear summary of the feature you'd like.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What problem does this solve? How would you use it in your workflow?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: How you think this could work. Sketches, keybinding ideas, and CLI examples are all welcome.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they didn't fit.
    validations:
      required: false

  - type: dropdown
    id: roadmap-phase
    attributes:
      label: Related roadmap phase
      description: Which phase from the README roadmap does this relate to?
      options:
        - "Phase 1: Scanner, forge abstraction, TUI shell"
        - "Phase 2: Diff viewer, inline comments"
        - "Phase 3: MR actions (approve, merge, close)"
        - "Phase 4: Pipeline/CI management"
        - "Phase 5: GitHub client"
        - "Phase 6: Plugins, MCP server"
        - "Phase 7: Neovim integration, advanced features"
        - "Not phase-specific / new idea"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else (screenshots, mockups, links to similar features in other tools).
    validations:
      required: false
